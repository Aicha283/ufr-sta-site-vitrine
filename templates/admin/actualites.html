{% extends 'base1.html' %}

{% block content %}
<section>
    <h2>Gestion des Actualités</h2>
    <a href="{{ url_for('admin_actualite_ajouter') }}">+ Ajouter une actualité</a>

    <table border="1">
        <tr>
            <th>Titre</th>
            <th>Date</th>
            <th>Actions</th>
        </tr>
        {% for actu in actualites %}
        <tr>
            <td>{{ actu.titre }}</td>
            <td>{{ actu.date }}</td>
            <td>
                <a href="{{ url_for('admin_actualite_modifier', id=actu.id) }}">Modifier</a>
                <a href="{{ url_for('admin_actualite_supprimer', id=actu.id) }}"
                   onclick="return confirm('Supprimer cette actualité ?')">Supprimer</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</section>
{% endblock %}
